<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* VIDEO BACKGROUND */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: brightness(0.5);
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, black 100%);
    z-index: -1;
}

/* CENTER CONTENT */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    opacity: 0;
    animation: fadeIn 3s ease forwards;
    animation-delay: 2s;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
    font-size: 1.1rem;
}

/* BUTTON */
button {
    margin-top: 30px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 1rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: 0.4s;
}

button:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
}

/* CINEMATIC INTRO TEXT */
.intro {
    position: absolute;
    width: 100%;
    top: 40%;
    text-align: center;
    font-size: 1.5rem;
    letter-spacing: 3px;
    opacity: 1;
    animation: fadeOut 2s ease forwards;
    animation-delay: 2s;
}

/* PARTICLES */
.particle {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    animation: float 8s linear infinite;
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(0,0,0,0.8);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    transition: 0.5s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* ANIMATIONS */
@keyframes fadeIn {
    to {opacity: 1;}
}

@keyframes fadeOut {
    to {opacity: 0;}
}

@keyframes float {
    from {transform: translateY(100vh); opacity: 1;}
    to {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<!-- 🎬 VIDEO BACKGROUND -->
<video autoplay muted loop>
    <source src="your-video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="intro">For Someone Special...</div>

<div class="container">
    <h1>You & Me 💖</h1>
    <p>In every lifetime, I’d still find you.</p>
    <button onclick="showLove()">Open My Heart 💌</button>
</div>

<div class="popup" id="popup">
    <h2>I Love You ❤️</h2>
    <p>You are my favorite person in every universe.</p>
</div>

<!-- FLOATING PARTICLES -->
<script>
for(let i=0;i<40;i++){
    let p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "✨";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(p);
}

function showLove(){
    document.getElementById("popup").classList.add("show");
}
</script>

</body>
</html>
