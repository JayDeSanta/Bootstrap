 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES Love Calculator 🔥❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔥 FIRE BACKGROUND */
.fire {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 100%, #ff512f, #000);
    overflow: hidden;
    z-index: -1;
}

.flame {
    position: absolute;
    bottom: -50px;
    width: 20px;
    height: 80px;
    background: linear-gradient(to top, #ff512f, #ffb347, transparent);
    border-radius: 50%;
    animation: rise 3s infinite ease-in;
    filter: blur(2px);
    opacity: 0.7;
}

@keyframes rise {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
    }
    100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
    }
}

/* 💖 UI */
.container {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    width: 320px;
}

h1 {
    color: white;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    background: #ff2e63;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    font-size: 20px;
    color: white;
    opacity: 0;
    transform: scale(0.5);
    transition: 0.5s;
}

.show {
    opacity: 1;
    transform: scale(1);
}

.meter {
    margin-top: 20px;
    width: 100%;
    height: 15px;
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
    overflow: hidden;
}

.meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff2e63, #ff9a9e);
    transition: 1s;
}

.percentage {
    color: white;
    margin-top: 10px;
}

/* ❤️ Heart */
.heart {
    font-size: 30px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%,100%{transform: scale(1);}
    50%{transform: scale(1.2);}
}
</style>

</head>
<body>

<div class="fire" id="fire"></div>

<div class="container">
    <h1> FLAMES ❤️</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Partner Name">

    <button onclick="calculateFlames()">Check Love</button>

    <div id="result" class="result"></div>

    <div class="meter">
        <div id="meterFill" class="meter-fill"></div>
    </div>

    <div id="percentText" class="percentage"></div>
</div>

<script>
// 🔥 Generate flames dynamically
function createFlames() {
    const fire = document.getElementById("fire");
    for (let i = 0; i < 40; i++) {
        let flame = document.createElement("div");
        flame.classList.add("flame");

        flame.style.left = Math.random() * 100 + "vw";
        flame.style.animationDuration = (2 + Math.random() * 2) + "s";
        flame.style.width = (10 + Math.random() * 20) + "px";

        fire.appendChild(flame);
    }
}
createFlames();

// 💖 FLAMES LOGIC
function calculateFlames() {
    let name1 = document.getElementById("name1").value.toLowerCase().replace(/\s/g,'');
    let name2 = document.getElementById("name2").value.toLowerCase().replace(/\s/g,'');

    if(name1 === "" || name2 === ""){
        alert("Enter both names ❤️");
        return;
    }

    let arr1 = name1.split('');
    let arr2 = name2.split('');

    for(let i=0;i<arr1.length;i++){
        for(let j=0;j<arr2.length;j++){
            if(arr1[i] === arr2[j]){
                arr1[i] = '';
                arr2[j] = '';
                break;
            }
        }
    }

    let count = (arr1.join('') + arr2.join('')).length;

    let flames = ["Friends 🤝","Love ❤️","Affection 💕","Marriage 💍","Enemies 😤","Siblings 👨‍👩‍👧"];

    let index = 0;

    while(flames.length > 1){
        index = (index + count - 1) % flames.length;
        flames.splice(index, 1);
    }

    let percentage = (name1.length * name2.length + count * 7) % 101;

    let resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `<div class="heart">❤️</div> ${flames[0]}`;
    resultDiv.classList.add("show");

    document.getElementById("meterFill").style.width = percentage + "%";
    document.getElementById("percentText").innerText = percentage + "% Love 💖";
}
</script>

</body>
</html>
