 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES ❤️🔥</title>

<style>

/* RESET */
html, body {
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:sans-serif;
    background: radial-gradient(circle, #1a0000, #000);
}

/* INTRO */
#intro {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}
#typingText {
    color:#ff4d6d;
    font-size:26px;
    border-right:3px solid #ff4d6d;
    animation: blink 0.7s infinite;
}
@keyframes blink {50%{border-color:transparent;}}

/* EMOJI BACKGROUND */
#loveBg {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

/* FLOAT */
.float {
    position:absolute;
    animation: floatUp linear infinite;
}
@keyframes floatUp {
    0% {transform:translateY(100vh); opacity:0;}
    20% {opacity:1;}
    100% {transform:translateY(-10vh); opacity:0;}
}

/* RUN */
.run {
    position:absolute;
    left:-50px;
    animation: runAcross linear infinite;
}
@keyframes runAcross {
    0% {transform:translateX(0); opacity:0;}
    20% {opacity:1;}
    100% {transform:translateX(110vw); opacity:0;}
}

/* APP */
.container {
    position:relative;
    z-index:2;
    width:320px;
    margin:auto;
    margin-top:80px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    color:white;
}

/* INPUT */
input {
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:10px;
}

/* BUTTON */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff2e63;
    color:white;
    cursor:pointer;
}

/* RESULT */
.result {opacity:0; transition:0.5s;}
.show {opacity:1;}

/* METER */
.meter-label {
    margin-top:15px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 5px #ff4d6d;}
    to {text-shadow:0 0 15px #ff1e4d;}
}
.meter {
    height:10px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
}
.meter-fill {
    height:100%;
    width:0%;
    background:pink;
}

/* POPUP */
.popup {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}
.popup-content {
    background:white;
    padding:20px;
    border-radius:15px;
}

.hidden {opacity:0;}
.showApp {animation:fadeIn 1.5s forwards;}
@keyframes fadeIn {to{opacity:1;}}

</style>
</head>

<body>

<div id="intro">
    <h1 id="typingText"></h1>
</div>

<div id="loveBg"></div>

<div id="mainApp" class="hidden">
<div class="container">
<h2>🔥 FLAMES ❤️</h2>

<input id="name1" placeholder="Your Name">
<input id="name2" placeholder="Partner Name">

<button onclick="calculate()">Check Love</button>

<div id="result" class="result"></div>

<div class="meter-label">💖 Love Meter 💖</div>
<div class="meter">
<div id="meterFill" class="meter-fill"></div>
</div>

<div id="percent"></div>
</div>
</div>

<div id="popup" class="popup">
<div class="popup-content">
<h3>💖 Love Message</h3>
<p id="popupText"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* INTRO */
let txt="Every Love Story Begins With A Name... ❤️";
let i=0;
function type(){
    if(i<txt.length){
        typingText.innerHTML+=txt[i++];
        setTimeout(type,40);
    } else setTimeout(startApp,1000);
}
function startApp(){
    intro.style.display="none";
    mainApp.classList.remove("hidden");
    mainApp.classList.add("showApp");
}
type();

/* BACKGROUND */
const loveBg=document.getElementById("loveBg");
const emojis=["🌹","💖","💕","💘","❤️","💞","🌸"];

/* FILL SCREEN INIT */
for(let i=0;i<100;i++){
    createFloat();
    createRun();
}

/* CONTINUOUS */
setInterval(createFloat,120);
setInterval(createRun,180);

function createFloat(){
    let e=document.createElement("div");
    e.className="float";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

    e.style.left=Math.random()*100+"vw";
    e.style.fontSize=(20+Math.random()*30)+"px";

    let d=6+Math.random()*5;
    e.style.animationDuration=d+"s";

    loveBg.appendChild(e);
    setTimeout(()=>e.remove(),d*1000);
}

function createRun(){
    let e=document.createElement("div");
    e.className="run";
    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

    e.style.top=Math.random()*100+"vh";
    e.style.fontSize=(18+Math.random()*25)+"px";

    let d=6+Math.random()*6;
    e.style.animationDuration=d+"s";

    loveBg.appendChild(e);
    setTimeout(()=>e.remove(),d*1000);
}

/* HEART BURST */
document.onclick=(e)=>{
    for(let i=0;i<6;i++){
        let h=document.createElement("div");
        h.innerText="💓";
        h.style.position="fixed";
        h.style.left=e.clientX+"px";
        h.style.top=e.clientY+"px";
        h.style.transition="1s";
        document.body.appendChild(h);

        setTimeout(()=>{
            h.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;
            h.style.opacity=0;
        },10);

        setTimeout(()=>h.remove(),1000);
    }
};

/* CALCULATE */
function calculate(){
    let a=name1.value.toLowerCase();
    let b=name2.value.toLowerCase();

    let res=["Friends 🤝","Love ❤️","Affection 💕","Marriage 💍","Enemies 😤","Siblings 👨‍👩‍👧"];
    result.innerHTML=res[(a.length+b.length)%6];
    result.classList.add("show");

    let p=(a.length*b.length)%101;
    meterFill.style.width=p+"%";
    percent.innerText=p+"% Love 💖";

    showPopup();
}

/* POPUP */
let msgs=["Made for each other 💕","True love 💖","Perfect bond ❤️","Destiny ❤️"];
function showPopup(){
    popup.style.display="flex";
    popupText.innerText=msgs[Math.floor(Math.random()*msgs.length)];
}
function closePopup(){
    popup.style.display="none";
}

</script>

</body>
</html>
