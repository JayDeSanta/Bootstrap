<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Love 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
}

/* GLOW OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    color: white;
    animation: fadeIn 2s ease;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5rem;
    text-shadow: 0 0 20px rgba(255,255,255,0.7);
}

p {
    margin-top: 10px;
    font-size: 1.2rem;
}

/* BUTTON */
button {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.3);
    color: white;
    font-size: 1rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: 0.4s;
}

button:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.6);
}

/* EMOJI FLOAT */
.emoji {
    position: absolute;
    font-size: 22px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh) scale(1.6);
        opacity: 0;
    }
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(255,255,255,0.9);
    color: #a855f7;
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    transition: 0.5s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>My Love 💜</h1>
    <p>Every moment with you feels like magic ✨💕</p>
    <button onclick="showLove()">Tap My Heart 💖</button>
</div>

<div class="popup" id="popup">
    <h2>💞 I Adore You 💞</h2>
    <p>You are my happiness 🌸💜✨ forever & always 💫</p>
</div>

<script>
// Romantic emoji rain
let emojis = ["💖","💜","💕","💞","🌸","✨","😍","💘"];

for(let i=0;i<50;i++){
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100 + "vw";
    e.style.animationDuration = (4 + Math.random()*4) + "s";
    document.body.appendChild(e);
}

// Popup
function showLove(){
    document.getElementById("popup").classList.add("show");
}
</script>

</body>
</html>
