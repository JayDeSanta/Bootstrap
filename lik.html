<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff4e50, #ff9a9e);
    overflow: hidden;
}

/* HEARTS */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    flex-direction: column;
}

h1 {
    font-size: 3rem;
    animation: fadeIn 2s ease;
}

p {
    margin-top: 10px;
    opacity: 0.8;
}

button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    background: white;
    color: #ff4e50;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4e50;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    transition: 0.4s;
}

.popup.show {
    transform: translate(-50%, -50%) scale(1);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for(let i=0;i<30;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(heart);
}
</script>

<div class="container">
    <h1>Hey ❤️</h1>
    <p>You make my world brighter ✨</p>
    <button onclick="showLove()">Click Me 💌</button>
</div>

<div class="popup" id="popup">
    <h2>I Like You 💖</h2>
    <p>More than words can say...</p>
</div>

<script>
function showLove(){
    document.getElementById("popup").classList.add("show");
}
</script>

</body>
</html>
